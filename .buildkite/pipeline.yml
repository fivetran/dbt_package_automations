            - "BASH_ENV=/tmp/.bashrc"
            - "BUILDKITE_BUILD_NUMBER"
            - "BUILDKITE_COMMIT"
            - "BUILDKITE_STEP_KEY"
    commands: |
      curl -s "${RUN_MODELS_URL}" | bash -s databricks-sql

  - label: ":azure: Run Tests - SQL Server"
    key: "run_dbt_sqlserver"
    if: build.env("ENABLED_WAREHOUSES") =~ /sqlserver/
    retry:
      automatic:
        - exit_status: -1  # Timeout
          limit: 1
