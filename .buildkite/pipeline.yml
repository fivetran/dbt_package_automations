      - docker#v3.13.0:
          image: "python:3.13"
          shell: [ "/bin/bash", "-e", "-c" ]
          environment:
            - "BASH_ENV=/tmp/.bashrc"
            - "BUILDKITE_BUILD_NUMBER"
            - "BUILDKITE_COMMIT"
            - "BUILDKITE_STEP_KEY"
    commands: |
      curl -s "${RUN_MODELS_URL}" | bash -s sqlserver