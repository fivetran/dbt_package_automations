env:
  RUN_MODELS_URL: "https://raw.githubusercontent.com/fivetran/dbt_package_automations/refs/heads/feature/centralized-bk/.buildkite/scripts/run_models.sh"

steps:
  - label: ":bug: Debug Environment Variables"
    key: "debug_env"
    command: |
      echo "=== Environment Variables Debug ==="
      echo "ENABLED_WAREHOUSES: ${ENABLED_WAREHOUSES:-'(not set)'}"
      echo "BUILDKITE_BUILD_NUMBER: ${BUILDKITE_BUILD_NUMBER:-'(not set)'}"
      echo "BUILDKITE_COMMIT: ${BUILDKITE_COMMIT:-'(not set)'}"
      echo "BUILDKITE_STEP_KEY: ${BUILDKITE_STEP_KEY:-'(not set)'}"
      echo "=================================="

  - label: ":postgres: Run Tests - Postgres"
    key: "run_dbt_postgres"
    if: build.env("ENABLED_WAREHOUSES") =~ /postgres/
    retry:
      automatic:
        - exit_status: -1  # Timeout
          limit: 1
    plugins:
      - docker#v3.13.0:
          image: "python:3.13"
          shell: [ "/bin/bash", "-e", "-c" ]
          environment:
            - "BASH_ENV=/tmp/.bashrc"
            - "BUILDKITE_BUILD_NUMBER"
            - "BUILDKITE_COMMIT"
            - "BUILDKITE_STEP_KEY"
    commands: |
      curl -s "${RUN_MODELS_URL}" | bash -s postgres 

  - label: ":snowflake-db: Run Tests - Snowflake"
    key: "run_dbt_snowflake"
    if: build.env("ENABLED_WAREHOUSES") =~ /snowflake/
    retry:
      automatic:
        - exit_status: -1  # Timeout
          limit: 1
    plugins:
      - docker#v3.13.0:
          image: "python:3.13"
          shell: [ "/bin/bash", "-e", "-c" ]
          environment:
            - "BASH_ENV=/tmp/.bashrc"
            - "BUILDKITE_BUILD_NUMBER"
            - "BUILDKITE_COMMIT"
            - "BUILDKITE_STEP_KEY"
    commands: |
      curl -s "${RUN_MODELS_URL}" | bash -s snowflake

  - label: ":gcloud: Run Tests - BigQuery"
    key: "run_dbt_bigquery"
    if: build.env("ENABLED_WAREHOUSES") =~ /bigquery/
    retry:
      automatic:
        - exit_status: -1  # Timeout
          limit: 1
    plugins:
      - docker#v3.13.0:
          image: "python:3.13"
          shell: [ "/bin/bash", "-e", "-c" ]
          environment:
            - "BASH_ENV=/tmp/.bashrc"
            - "BUILDKITE_BUILD_NUMBER"
            - "BUILDKITE_COMMIT"
            - "BUILDKITE_STEP_KEY"
    commands: |
      curl -s "${RUN_MODELS_URL}" | bash -s bigquery

  - label: ":amazon-redshift: Run Tests - Redshift"
    key: "run_dbt_redshift"
    if: build.env("ENABLED_WAREHOUSES") =~ /redshift/
    concurrency: 3
    concurrency_group: "warehouse/redshift"
    retry:
      automatic:
        - exit_status: -1  # Timeout
          limit: 1
    plugins:
      - docker#v3.13.0:
          image: "python:3.13"
          shell: [ "/bin/bash", "-e", "-c" ]
          environment:
            - "BASH_ENV=/tmp/.bashrc"
            - "BUILDKITE_BUILD_NUMBER"
            - "BUILDKITE_COMMIT"
            - "BUILDKITE_STEP_KEY"
    commands: |
      curl -s "${RUN_MODELS_URL}" | bash -s redshift

  - label: ":databricks: Run Tests - Databricks"
    key: "run_dbt_databricks"
    if: build.env("ENABLED_WAREHOUSES") =~ /databricks/
    retry:
      automatic:
        - exit_status: -1  # Timeout
          limit: 1
    plugins:
      - docker#v3.13.0:
          image: "python:3.13"
          shell: [ "/bin/bash", "-e", "-c" ]
          environment:
            - "BASH_ENV=/tmp/.bashrc"
            - "BUILDKITE_BUILD_NUMBER"
            - "BUILDKITE_COMMIT"
            - "BUILDKITE_STEP_KEY"
    commands: |
      curl -s "${RUN_MODELS_URL}" | bash -s databricks

  - label: ":databricks: :database: Run Tests - Databricks SQL"
    key: "run_dbt_databricks_sql"
