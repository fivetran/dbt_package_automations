# dbt Package - Buildkite CI/CD Pipeline
#
# Template for new dbt packages using centralized infrastructure.
# 1. Update the package name in the header comment above
# 2. Configure TEST_* flags in your pre-command hook for supported warehouses
# 3. Create integration_tests/ci/test_scenarios.yml for your package
# 4. That's it! Secrets, environment variables, and testing are all automated.

steps:
  - label: ":gear: Load Central Pipeline"
    key: "load_pipeline"
    command: |
      # Download the centralized pipeline definition
      curl -f -s https://raw.githubusercontent.com/fivetran/dbt_package_automations/main/.buildkite/pipeline.yml \
        | buildkite-agent pipeline upload  # Upload and replace current pipeline