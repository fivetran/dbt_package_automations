# Template test_scenarios.yml for new dbt packages
# Copy this file to your package's integration_tests/ci/ directory
# Update the schema_variable_name and test scenarios for your package

# The dbt variable name that controls which schema to use for testing
# Example: for amazon_ads package, this would be "amazon_ads_schema"
schema_variable_name: "YOUR_PACKAGE_schema"

# Whether the default scenario should include incremental testing
default_include_incremental: false

# List of test scenarios to run
test_scenarios:
  # Example: Test with a feature disabled
  - name: "example feature disabled"
    vars:
      your_package__example_feature_enabled: false
    include_incremental: false

  # Example: Test with custom configuration
  # - name: "custom config test"
  #   vars:
  #     your_package__custom_setting: "custom_value"
  #   include_incremental: true
  #   warehouses: ["postgres", "snowflake"]  # Optional: limit to specific warehouses